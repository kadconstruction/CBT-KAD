<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAD Computer Based Test</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
   <header>
     <img src="kadlogo.png" alt="">
     <h1>KAD ROBOTICS</h1>  
   </header>
   
   <form id="profileForm">     
     <div class="div1">
     <section class="profile" id="profile">
     <h1 class="login">LOGIN</h1>
     <hr>
     <label for="fname"><b>First Name:</b></label><br>
     <input type="text" id="fname" name="First Name" placeholder="First Name" required><br>
      <label for="lname"><b>Last Name:</b></label><br>
     <input type="text" id="lname" name="Last Name" placeholder="Last Name" required><br>
     <label for="email"><b>Email:</b></label><br>
     <input type="email" id="email" name="Email" placeholder="Email"><br>
     <label for="psw"><b>Password:</b></label><br>
     <input type="password" id="psw" name="password" placeholder="Password" required><br>
     <button class="btn" type="submit">Login</button>
     </section>
     </div>
     
   </form>
   
   <footer>© 2026 KAD CBT</footer>
   
   <script>
     document.getElementById("profileForm").addEventListener("submit", function(e) {
    e.preventDefault();

    // Save to localStorage
    localStorage.setItem("fname", document.getElementById("fname").value);
    localStorage.setItem("lname", document.getElementById("lname").value);
    localStorage.setItem("email", document.getElementById("email").value);

    // Move to next page
    window.location.href = "index2.html";
});
   </script>
</body>
</html>
